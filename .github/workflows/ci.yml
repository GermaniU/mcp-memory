name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          # Sin requirements*.txt en el repo, cache:pip necesita el path explícito.
          cache-dependency-path: server/pyproject.toml

      - name: Instalar dependencias
        run: pip install -e ".[dev]"

      - name: ruff check
        run: ruff check src tests scripts

  test:
    name: Tests unitarios (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: server/pyproject.toml

      - name: Instalar dependencias
        run: pip install -e ".[dev]"

      - name: pytest (unit)
        run: pytest tests/unit -q
