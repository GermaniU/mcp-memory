<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#34D399" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#34D399" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- subtle grid -->
  <g stroke="#334155" stroke-width="1" opacity="0.25">
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- glow accent -->
  <circle cx="950" cy="170" r="280" fill="url(#glow)"/>

  <!-- top eyebrow / project tag -->
  <g transform="translate(80, 80)">
    <rect x="0" y="0" width="14" height="14" rx="3" fill="url(#accent)"/>
    <text x="28" y="12" font-family="-apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif"
          font-size="18" font-weight="600" fill="#94A3B8" letter-spacing="2">
      OPEN SOURCE · MIT · MCP SERVER
    </text>
  </g>

  <!-- main title -->
  <text x="80" y="220" font-family="-apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="92" font-weight="800" fill="#FFFFFF" letter-spacing="-2">
    OpenClaw
  </text>
  <text x="80" y="320" font-family="-apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="92" font-weight="800" fill="url(#accent)" letter-spacing="-2">
    System Memory
  </text>

  <!-- tagline -->
  <text x="80" y="380" font-family="-apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="28" font-weight="500" fill="#CBD5E1">
    Lleva la memoria de tu agente IA a cualquier máquina.
  </text>
  <text x="80" y="416" font-family="-apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="22" font-weight="400" fill="#94A3B8">
    Servidor MCP local con búsqueda semántica · Ollama + Qdrant · Python.
  </text>

  <!-- chips / tags -->
  <g font-family="-apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif"
     font-size="18" font-weight="600">
    <g transform="translate(80, 470)">
      <rect width="120" height="38" rx="19" fill="#1E293B" stroke="#334155" stroke-width="1"/>
      <text x="60" y="25" text-anchor="middle" fill="#E2E8F0">Claude Code</text>
    </g>
    <g transform="translate(212, 470)">
      <rect width="98" height="38" rx="19" fill="#1E293B" stroke="#334155" stroke-width="1"/>
      <text x="49" y="25" text-anchor="middle" fill="#E2E8F0">OpenCode</text>
    </g>
    <g transform="translate(322, 470)">
      <rect width="80" height="38" rx="19" fill="#1E293B" stroke="#334155" stroke-width="1"/>
      <text x="40" y="25" text-anchor="middle" fill="#E2E8F0">Cursor</text>
    </g>
    <g transform="translate(414, 470)">
      <rect width="100" height="38" rx="19" fill="#1E293B" stroke="#334155" stroke-width="1"/>
      <text x="50" y="25" text-anchor="middle" fill="#E2E8F0">Continue</text>
    </g>
    <g transform="translate(526, 470)">
      <rect width="74" height="38" rx="19" fill="#1E293B" stroke="#334155" stroke-width="1"/>
      <text x="37" y="25" text-anchor="middle" fill="#34D399">+ MCP</text>
    </g>
  </g>

  <!-- bottom URL bar -->
  <line x1="80" y1="560" x2="1120" y2="560" stroke="#334155" stroke-width="1"/>
  <text x="80" y="595" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace"
        font-size="20" font-weight="500" fill="#94A3B8">
    github.com/GermaniU/GermaniU-OpenClawSystemMemory
  </text>
  <text x="1120" y="595" text-anchor="end" font-family="-apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="20" font-weight="600" fill="#34D399">
    @GermaniU
  </text>
</svg>
